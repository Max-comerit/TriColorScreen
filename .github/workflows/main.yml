# .github/workflows/main.yml

name: CI

on:
  push:           # triggers lint-and-security-audit on all branches

jobs:
  lint-and-security-audit:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone the repo into the GitHub Actions runner
      - uses: actions/checkout@v4
      - name: Use secret
        run: echo "NUXT_PUBLIC_SITE_URL key is ${{ secrets.NUXT_PUBLIC_SITE_URL }}"
        env:
          NUXT_PUBLIC_SITE_URL: ${{ secrets.NUXT_PUBLIC_SITE_URL }}

      # 2. Install correct Node version in this machine
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. Install dependencies exactly as in lockfile
      - run: npm ci

      # 4. Run linter (Next.js has next lint built-in)
      - run: npm run lint

      # 5. Run security audit
      - name: Run security audit
        run: npm run security:audit

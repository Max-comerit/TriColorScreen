# Netlify Build Configuration
[build]
  command = "npm run generate:clean"
  publish = "dist/"

[build.environment]
  SITE_URL = "https://tricolorscreen.netlify.app"

[context.deploy-preview.environment]
  # Empty: falls through to process.env.DEPLOY_PRIME_URL (the actual deploy preview URL) in nuxt.config.ts
  SITE_URL = ""

[context.production.environment]
  SITE_URL = "https://tricolorscreen.se"

# Note: No SPA catch-all redirect — this is SSG (nuxt generate).
# All routes are pre-rendered to their own index.html files.
# Unknown routes correctly return 404 via Nuxt's error page.

# Cache settings for static assets
# More specific rules must come BEFORE the catch-all /_nuxt/** rule.
# Netlify applies the last matching rule, so order matters.

[[headers]]
  for = "/images/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/**"
  [headers.values]
    # 1-year cache to satisfy Lighthouse. Not immutable — filenames are not
    # content-hashed, so rename/version the file (e.g. hero-v2.webm) when updating.
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/.netlify/images"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_nuxt/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Build Configuration
[build]
  command = "npm run generate"
  publish = "dist/"

# Redirect all non-file requests to index.html for SPA routing
# Status 200 redirects don't affect POST requests (Netlify Forms)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Cache settings for static assets
# More specific rules must come BEFORE the catch-all /_nuxt/** rule.
# Netlify applies the last matching rule, so order matters.

[[headers]]
  for = "/images/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_ipx/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_nuxt/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

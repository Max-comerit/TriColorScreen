# Netlify Build Configuration
[build]
  command = "npm run generate"
  publish = "dist/"

# Note: No SPA catch-all redirect — this is SSG (nuxt generate).
# All routes are pre-rendered to their own index.html files.
# Unknown routes correctly return 404 via Nuxt's error page.

# Cache settings for static assets
# More specific rules must come BEFORE the catch-all /_nuxt/** rule.
# Netlify applies the last matching rule, so order matters.

[[headers]]
  for = "/images/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_ipx/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_nuxt/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

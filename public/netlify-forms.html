<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <title>Netlify Forms Detection</title>
  </head>
  <body>
    <!--
      This file exists solely for Netlify's build-time form detection crawler.
      Netlify scans static HTML files in the publish directory to register forms.
      Because Nuxt 3 renders forms via JavaScript (Vue components), they may not
      appear in the pre-rendered HTML that Netlify's crawler reads.
      This plain HTML file guarantees Netlify can always find and register the form.
    -->
    <form name="contact-v2" enctype="multipart/form-data" method="POST" action="/" netlify-honeypot="bot-field" autocomplete="off" data-netlify="true">
      <input type="hidden" name="form-name" value="contact-v2">
      <input type="text" name="name" autocomplete="name">
      <input type="email" name="email" autocomplete="email">
      <input type="tel" name="phone" autocomplete="tel">
      <select name="customer_type" autocomplete="off">
        <option value="person">person</option>
        <option value="company">company</option>
      </select>
      <input type="text" name="subject" autocomplete="off">
      <input type="file" name="image_1" autocomplete="off">
      <input type="file" name="image_2" autocomplete="off">
      <input type="file" name="image_3" autocomplete="off">
      <input type="file" name="image_4" autocomplete="off">
      <input type="file" name="image_5" autocomplete="off">
      <input type="file" name="image_6" autocomplete="off">
      <input type="file" name="image_7" autocomplete="off">
      <input type="file" name="image_8" autocomplete="off">
      <input type="file" name="image_9" autocomplete="off">
      <input type="file" name="image_10" autocomplete="off">
      <textarea name="message" autocomplete="off"></textarea>
      <input type="checkbox" name="gdpr_consent" autocomplete="off">
      <input name="bot-field" autocomplete="off" style="display:none">
      <button type="submit">Skicka</button>
    </form>

    <!--
      Quote textiles request form — registered for Netlify Forms detection.
      Fields mirror components/features/QuoteTextilesForm.vue exactly.
    -->
    <form name="quote-textiles" enctype="multipart/form-data" method="POST" action="/" netlify-honeypot="bot-field" autocomplete="off" data-netlify="true">
      <input type="hidden" name="form-name" value="quote-textiles">
      <input type="text" name="name" autocomplete="name">
      <input type="email" name="email" autocomplete="email">
      <input type="tel" name="phone" autocomplete="tel">
      <select name="customer_type" autocomplete="off">
        <option value="person">person</option>
        <option value="company">company</option>
      </select>
      <input type="text" name="subject" value="Offertförfrågan (Textil, Reklam och Bildekor)" autocomplete="off">
      <input type="text" name="product_category" autocomplete="off">
      <input type="text" name="product" autocomplete="off">
      <input type="text" name="product_id" autocomplete="off">
      <input type="text" name="size" autocomplete="off">
      <input type="number" name="product_count" autocomplete="off">
      <input type="file" name="image_1" autocomplete="off">
      <input type="file" name="image_2" autocomplete="off">
      <input type="file" name="image_3" autocomplete="off">
      <input type="file" name="image_4" autocomplete="off">
      <input type="file" name="image_5" autocomplete="off">
      <input type="file" name="image_6" autocomplete="off">
      <input type="file" name="image_7" autocomplete="off">
      <input type="file" name="image_8" autocomplete="off">
      <input type="file" name="image_9" autocomplete="off">
      <input type="file" name="image_10" autocomplete="off">
      <input type="file" name="image_11" autocomplete="off">
      <input type="file" name="image_12" autocomplete="off">
      <input type="file" name="image_13" autocomplete="off">
      <input type="file" name="image_14" autocomplete="off">
      <input type="file" name="image_15" autocomplete="off">
      <input type="file" name="image_16" autocomplete="off">
      <input type="hidden" name="texter">
      <textarea name="message" autocomplete="off"></textarea>
      <input type="checkbox" name="gdpr_consent" autocomplete="off">
      <input name="bot-field" autocomplete="off" style="display:none">
      <button type="submit">Skicka offertförfrågan</button>
    </form>
    <!--
      Quote printed matter request form — registered for Netlify Forms detection.
      Fields mirror components/features/QuotePrintedMatterForm.vue exactly.
    -->
    <form name="quote-printed-matter" enctype="multipart/form-data" method="POST" action="/" netlify-honeypot="bot-field" autocomplete="off" data-netlify="true">
      <input type="hidden" name="form-name" value="quote-printed-matter">
      <input type="text" name="name" autocomplete="name">
      <input type="email" name="email" autocomplete="email">
      <input type="tel" name="phone" autocomplete="tel">
      <select name="customer_type" autocomplete="off">
        <option value="person">person</option>
        <option value="company">company</option>
      </select>
      <input type="text" name="subject" value="Offertförfrågan (Trycksaker)" autocomplete="off">
      <input type="text" name="product_category" autocomplete="off">
      <select name="product" autocomplete="off">
        <option value="Foldrar">Foldrar</option>
        <option value="Broschyrer">Broschyrer</option>
        <option value="Affischer">Affischer</option>
        <option value="Visitkort">Visitkort</option>
        <option value="Kuvert">Kuvert</option>
        <option value="Menyer & Bordsryttare">Menyer & Bordsryttare</option>
      </select>
      <input type="text" name="size" autocomplete="off">
      <input type="text" name="material" autocomplete="off">
      <input type="text" name="print" autocomplete="off">
      <input type="text" name="finishing" autocomplete="off">
      <input type="number" name="product_count" autocomplete="off">
      <input type="file" name="file_1" autocomplete="off">
      <input type="file" name="file_2" autocomplete="off">
      <input type="file" name="file_3" autocomplete="off">
      <input type="file" name="file_4" autocomplete="off">
      <input type="file" name="file_5" autocomplete="off">
      <input type="file" name="file_6" autocomplete="off">
      <input type="file" name="file_7" autocomplete="off">
      <input type="file" name="file_8" autocomplete="off">
      <input type="file" name="file_9" autocomplete="off">
      <input type="file" name="file_10" autocomplete="off">
      <textarea name="message" autocomplete="off"></textarea>
      <input type="checkbox" name="gdpr_consent" autocomplete="off">
      <input name="bot-field" autocomplete="off" style="display:none">
      <button type="submit">Skicka offertförfrågan</button>
    </form>
  </body>
</html>
